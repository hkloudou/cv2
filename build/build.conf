# Central build manifest.
#
# Version lines: every OpenCV version in OPENCV_VERSIONS gets its own set of
# prebuilt/<opencv-version>/<target> branches and its own release line under
# the module version scheme
#
#     v0.<code>.<revision>      code = major*10000 + minor*100 + patch
#
# e.g. OpenCV 4.12.0 -> v0.41200.N, OpenCV 5.0.0 -> v0.50000.N. Users pin a
# line with a prefix query (`go get github.com/hkloudou/cv2@v0.41200`) and
# switch OpenCV versions by switching that one module version.
#
# Retired lines: OpenCV 4.8.1 is frozen at v0.40801.0 - its released tags
# stay consumable forever, but it is no longer built, tested, or released.
#
# OPENCV_VERSION is the primary line: local `make` defaults and the full CI
# test matrix run against it (other lines get the same jobs too).
OPENCV_VERSION=4.12.0
OPENCV_VERSIONS="4.12.0 5.0.0"
OPENCV_SHA256_41200=44c106d5bb47efec04e531fd93008b3fcd1d27138985c5baf4eafac0e1ec9e9d
OPENCV_SHA256_50000=b0528f5a1d379d59d4701cb28c36e22214cc51cf64594e5b56f2d3e6c0233095
OPENCV_URL_BASE=https://github.com/opencv/opencv/archive/refs/tags

# BUILD_LIST per line. OpenCV 5 renamed features2d -> features and split
# calib3d into calib/stereo/geometry (findHomography now lives in geometry);
# a per-version OPENCV_MODULES_<code> overrides the default list.
OPENCV_MODULES=core,imgproc,features2d,calib3d,objdetect
OPENCV_MODULES_50000=core,imgproc,features,geometry,objdetect

CV2_BASE_LIBS="opencv_imgproc opencv_core"
CV2_FEATURE_SETS="f2d qr"
# Candidate archives per feature set; only those actually produced by the
# selected line are packaged and linked, so one list serves every line
# (4.x names and 5.x names side by side). Order matters: dependents before
# dependencies.
CV2_F2D_LIBS="opencv_calib3d opencv_features2d opencv_features opencv_geometry opencv_flann"
CV2_F2D_WRAPPER_SOURCES="f2d.cpp"
CV2_QR_LIBS="opencv_objdetect opencv_calib3d opencv_features2d opencv_features opencv_geometry opencv_flann"
CV2_QR_WRAPPER_SOURCES="qr.cpp"
