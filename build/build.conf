# Central build manifest. Changing anything here changes the OpenCV build key,
# which makes CI rebuild the "fixed layer" (OpenCV static libraries) for every
# target. Day-to-day wrapper/Go changes do NOT rebuild that layer.
#
# To enable more OpenCV functionality in the future, extend OPENCV_MODULES
# (comma-separated cmake BUILD_LIST) and add the matching wrapper code.
OPENCV_VERSION=4.8.1
OPENCV_SHA256=62f650467a60a38794d681ae7e66e3e8cfba38f445e0bf87867e2f2cdc8be9d5
OPENCV_MODULES=core,imgproc
OPENCV_URL_BASE=https://github.com/opencv/opencv/archive/refs/tags
