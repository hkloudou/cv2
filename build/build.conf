# Central build manifest. Changing anything here changes the OpenCV build key,
# which makes CI rebuild the "fixed layer" (OpenCV static libraries) for every
# target. Day-to-day wrapper/Go changes do NOT rebuild that layer.
#
# OPENCV_MODULES is the superset compiled into the SDK. Packaging then splits
# the result: the base libs module carries CV2_BASE_LIBS (linked by every
# importer of github.com/hkloudou/cv2), and each feature set in
# CV2_FEATURE_SETS becomes an optional libs module that users only download
# when they import the matching subpackage (e.g. github.com/hkloudou/cv2/f2d).
OPENCV_VERSION=4.8.1
OPENCV_SHA256=62f650467a60a38794d681ae7e66e3e8cfba38f445e0bf87867e2f2cdc8be9d5
OPENCV_MODULES=core,imgproc,features2d,calib3d
OPENCV_URL_BASE=https://github.com/opencv/opencv/archive/refs/tags

CV2_BASE_LIBS="opencv_imgproc opencv_core"
CV2_FEATURE_SETS="f2d"
# Candidate archives per feature set; only those actually produced by the
# build are packaged and linked (e.g. flann appears only if features2d
# pulled it in). Order matters: dependents before dependencies.
CV2_F2D_LIBS="opencv_calib3d opencv_features2d opencv_flann"
CV2_F2D_WRAPPER_SOURCES="f2d.cpp"
