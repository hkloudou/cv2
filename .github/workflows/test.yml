# Tests the Go bindings against the CI-built static libraries, across every
# OpenCV version line declared in build/build.conf.
#
# The libs modules are taken from the prebuilt/<opencv-version>/* branches
# via go.work, so tests always run against the latest CI binaries without
# needing release tags. A job is skipped with a warning when its prebuilt
# branch does not exist yet (fresh bootstrap) or was built from older
# wrapper sources than this commit (a coordinated wrapper+Go push:
# build-libs rebuilds first, then re-triggers this workflow via
# workflow_run).
name: test

on:
  push:
    branches-ignore:
      - 'prebuilt/**'
  pull_request:
  workflow_dispatch:
  workflow_run:
    workflows: [build-libs]
    types: [completed]

permissions:
  contents: read

jobs:
  setup:
    runs-on: ubuntu-24.04
    outputs:
      versions: ${{ steps.v.outputs.versions }}
    steps:
      - uses: actions/checkout@v4
      - id: v
        run: |
          set -euo pipefail
          source build/build.conf
          versions=$(python3 -c 'import json,sys; print(json.dumps(sys.argv[1:]))' $OPENCV_VERSIONS)
          echo "versions=$versions" >> "$GITHUB_OUTPUT"

  # Full test run on native linux/amd64.
  test-linux-amd64:
    needs: setup
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        opencv: ${{ fromJson(needs.setup.outputs.versions) }}
    env:
      CV2_OPENCV_VERSION: ${{ matrix.opencv }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: false
      - name: Fetch prebuilt libraries
        id: fetch
        uses: ./.github/actions/fetch-prebuilt
        with:
          target: linux-amd64
      - name: Check generated ABI handshake files
        run: build/gen-abi.sh --check
      - name: Test
        if: steps.fetch.outputs.present == 'true'
        run: |
          set -euo pipefail
          build/setup-gowork.sh
          go vet ./...
          go test -v ./...
      - name: AddressSanitizer leak check (wrapper)
        if: steps.fetch.outputs.present == 'true'
        run: |
          set -euo pipefail
          # Headers are not shipped in libs modules; take them from the
          # prebuilt branch sdk (FETCH_HEAD still points at it from the
          # fetch step).
          hpp=$(find .prebuilt -path '*opencv2/core.hpp' | head -1 || true)
          if [ -z "$hpp" ]; then
            git archive FETCH_HEAD sdk/include | tar -x -C .prebuilt
            hpp=$(find .prebuilt/sdk -path '*opencv2/core.hpp' | head -1)
          fi
          include_root=$(dirname "$(dirname "$hpp")")
          mkdir -p .work
          g++ -std=c++11 -O1 -g -fsanitize=address -I "$include_root" \
            build/asan/leakcheck.cpp \
            -L .prebuilt/libs/linux_amd64 \
            -lcv2wrapper -lopencv_imgproc -lopencv_core -lzlib \
            -lstdc++ -lm -lpthread -ldl -o .work/leakcheck
          ASAN_OPTIONS=detect_leaks=1 ./.work/leakcheck

  # Full test run on native Windows with the same MSYS2 MinGW-w64 toolchain
  # users have. The test step runs inside the MSYS2 MINGW64 shell so its gcc
  # is guaranteed to be first in PATH; path-type:inherit keeps the runner's
  # Go visible in that shell.
  test-windows-amd64:
    needs: setup
    runs-on: windows-2022
    strategy:
      fail-fast: false
      matrix:
        opencv: ${{ fromJson(needs.setup.outputs.versions) }}
    env:
      CV2_OPENCV_VERSION: ${{ matrix.opencv }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: false
      - uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          path-type: inherit
          install: mingw-w64-x86_64-gcc
      - name: Fetch prebuilt libraries
        id: fetch
        uses: ./.github/actions/fetch-prebuilt
        with:
          target: windows-amd64
      - name: Test
        if: steps.fetch.outputs.present == 'true'
        shell: msys2 {0}
        env:
          CGO_ENABLED: '1'
        run: |
          set -euo pipefail
          gcc --version | head -1
          build/setup-gowork.sh
          go test -v ./...

  # Full test run on native Apple Silicon.
  test-darwin-arm64:
    needs: setup
    runs-on: macos-14
    strategy:
      fail-fast: false
      matrix:
        opencv: ${{ fromJson(needs.setup.outputs.versions) }}
    env:
      CV2_OPENCV_VERSION: ${{ matrix.opencv }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: false
      - name: Fetch prebuilt libraries
        id: fetch
        uses: ./.github/actions/fetch-prebuilt
        with:
          target: darwin-arm64
      - name: Test
        if: steps.fetch.outputs.present == 'true'
        run: |
          set -euo pipefail
          build/setup-gowork.sh
          go test -v ./...

  # Cross link checks: compile and link the full test binaries (root package
  # and f2d) for the remaining targets. linux-386 and linux-arm64 binaries
  # are also executed (natively / under qemu-user).
  cross:
    needs: setup
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        opencv: ${{ fromJson(needs.setup.outputs.versions) }}
        target: [linux-386, linux-arm64, windows-amd64, windows-386]
        include:
          - target: linux-386
            run: native
          - target: linux-arm64
            run: qemu-aarch64
          - target: windows-amd64
            run: none
          - target: windows-386
            run: none
    env:
      CV2_OPENCV_VERSION: ${{ matrix.opencv }}
      TARGET: ${{ matrix.target }}
      RUN_MODE: ${{ matrix.run }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: false
      - name: Install toolchain
        run: |
          set -euo pipefail
          sudo apt-get update
          extra=''
          if [ "$RUN_MODE" = 'qemu-aarch64' ]; then
            extra='qemu-user-static'
          fi
          # shellcheck disable=SC2046
          sudo apt-get install -y --no-install-recommends \
            $(build/ci-apt-packages.sh "$TARGET") $extra
      - name: Fetch prebuilt libraries
        id: fetch
        uses: ./.github/actions/fetch-prebuilt
        with:
          target: ${{ matrix.target }}
      - name: Build test binaries
        if: steps.fetch.outputs.present == 'true'
        run: |
          set -euo pipefail
          build/setup-gowork.sh
          source "build/targets/$TARGET.env"
          export CGO_ENABLED=1 GOOS=$TARGET_GOOS GOARCH=$TARGET_GOARCH CC=$CROSS_CC
          go test -c -o .work/cv2.test .
          go test -c -o .work/f2d.test ./f2d
          go test -c -o .work/qr.test ./qr
          ls -la .work/cv2.test .work/f2d.test .work/qr.test
      - name: Run test binaries
        if: steps.fetch.outputs.present == 'true' && matrix.run != 'none'
        run: |
          set -euo pipefail
          case "$RUN_MODE" in
            native)
              ./.work/cv2.test -test.v
              ./.work/f2d.test -test.v
              ./.work/qr.test -test.v
              ;;
            qemu-aarch64)
              qemu-aarch64-static -L /usr/aarch64-linux-gnu ./.work/cv2.test -test.v
              qemu-aarch64-static -L /usr/aarch64-linux-gnu ./.work/f2d.test -test.v
              qemu-aarch64-static -L /usr/aarch64-linux-gnu ./.work/qr.test -test.v
              ;;
          esac
