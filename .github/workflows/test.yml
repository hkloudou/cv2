# Tests the Go bindings against the CI-built static libraries.
#
# The libs modules are taken from the prebuilt/* branches via go.work, so
# tests always run against the latest CI binaries without needing release
# tags. A job is skipped with a warning when its prebuilt branch does not
# exist yet (fresh bootstrap) or was built from older wrapper sources than
# this commit (a coordinated wrapper+Go push: build-libs rebuilds first,
# then re-triggers this workflow via workflow_run).
name: test

on:
  push:
    branches-ignore:
      - 'prebuilt/**'
  pull_request:
  workflow_dispatch:
  workflow_run:
    workflows: [build-libs]
    types: [completed]

permissions:
  contents: read

jobs:
  # Full test run on native linux/amd64.
  test-linux-amd64:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: false
      - name: Fetch prebuilt libraries
        id: fetch
        env:
          TARGET: linux-amd64
        run: |
          set -euo pipefail
          if build/fetch-prebuilt.sh --require-fresh "$TARGET"; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            status=$?
            echo "present=false" >> "$GITHUB_OUTPUT"
            case "$status" in
              3) echo "::warning::prebuilt/$TARGET missing; skipping tests (run build-libs first)" ;;
              4) echo "::warning::prebuilt/$TARGET stale; tests rerun after build-libs completes" ;;
              *) exit "$status" ;;
            esac
          fi
      - name: Test
        if: steps.fetch.outputs.present == 'true'
        run: |
          set -euo pipefail
          build/setup-gowork.sh
          go vet ./...
          go test -v ./...

  # Full test run on native Windows with the same MSYS2 MinGW-w64 toolchain
  # users have. The test step runs inside the MSYS2 MINGW64 shell so its gcc
  # is guaranteed to be first in PATH; path-type:inherit keeps the runner's
  # Go visible in that shell.
  test-windows-amd64:
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: false
      - uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          path-type: inherit
          install: mingw-w64-x86_64-gcc
      - name: Fetch prebuilt libraries
        id: fetch
        shell: bash
        env:
          TARGET: windows-amd64
        run: |
          set -euo pipefail
          if build/fetch-prebuilt.sh --require-fresh "$TARGET"; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            status=$?
            echo "present=false" >> "$GITHUB_OUTPUT"
            case "$status" in
              3) echo "::warning::prebuilt/$TARGET missing; skipping tests (run build-libs first)" ;;
              4) echo "::warning::prebuilt/$TARGET stale; tests rerun after build-libs completes" ;;
              *) exit "$status" ;;
            esac
          fi
      - name: Test
        if: steps.fetch.outputs.present == 'true'
        shell: msys2 {0}
        env:
          CGO_ENABLED: '1'
        run: |
          set -euo pipefail
          gcc --version | head -1
          build/setup-gowork.sh
          go test -v ./...

  # Full test run on native Apple Silicon.
  test-darwin-arm64:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: false
      - name: Fetch prebuilt libraries
        id: fetch
        env:
          TARGET: darwin-arm64
        run: |
          set -euo pipefail
          if build/fetch-prebuilt.sh --require-fresh "$TARGET"; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            status=$?
            echo "present=false" >> "$GITHUB_OUTPUT"
            case "$status" in
              3) echo "::warning::prebuilt/$TARGET missing; skipping tests (run build-libs first)" ;;
              4) echo "::warning::prebuilt/$TARGET stale; tests rerun after build-libs completes" ;;
              *) exit "$status" ;;
            esac
          fi
      - name: Test
        if: steps.fetch.outputs.present == 'true'
        run: |
          set -euo pipefail
          build/setup-gowork.sh
          go test -v ./...

  # Cross link checks: compile and link the full test binary for the other
  # targets. linux-386 and linux-arm64 binaries are also executed (natively /
  # under qemu-user), so those get real test coverage as well.
  cross:
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: linux-386
            run: native
          - target: linux-arm64
            run: qemu-aarch64
          - target: windows-amd64
            run: none
          - target: windows-386
            run: none
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: false
      - name: Install toolchain
        env:
          TARGET: ${{ matrix.target }}
          RUN_MODE: ${{ matrix.run }}
        run: |
          set -euo pipefail
          sudo apt-get update
          extra=''
          if [ "$RUN_MODE" = 'qemu-aarch64' ]; then
            extra='qemu-user-static'
          fi
          # shellcheck disable=SC2046
          sudo apt-get install -y --no-install-recommends \
            $(build/ci-apt-packages.sh "$TARGET") $extra
      - name: Fetch prebuilt libraries
        id: fetch
        env:
          TARGET: ${{ matrix.target }}
        run: |
          set -euo pipefail
          if build/fetch-prebuilt.sh --require-fresh "$TARGET"; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            status=$?
            echo "present=false" >> "$GITHUB_OUTPUT"
            case "$status" in
              3) echo "::warning::prebuilt/$TARGET missing; skipping (run build-libs first)" ;;
              4) echo "::warning::prebuilt/$TARGET stale; rerun happens after build-libs completes" ;;
              *) exit "$status" ;;
            esac
          fi
      - name: Build test binaries
        if: steps.fetch.outputs.present == 'true'
        env:
          TARGET: ${{ matrix.target }}
        run: |
          set -euo pipefail
          build/setup-gowork.sh
          source "build/targets/$TARGET.env"
          export CGO_ENABLED=1 GOOS=$TARGET_GOOS GOARCH=$TARGET_GOARCH CC=$CROSS_CC
          go test -c -o .work/cv2.test .
          go test -c -o .work/f2d.test ./f2d
          ls -la .work/cv2.test .work/f2d.test
      - name: Run test binaries
        if: steps.fetch.outputs.present == 'true' && matrix.run != 'none'
        env:
          RUN_MODE: ${{ matrix.run }}
        run: |
          set -euo pipefail
          case "$RUN_MODE" in
            native)
              ./.work/cv2.test -test.v
              ./.work/f2d.test -test.v
              ;;
            qemu-aarch64)
              qemu-aarch64-static -L /usr/aarch64-linux-gnu ./.work/cv2.test -test.v
              qemu-aarch64-static -L /usr/aarch64-linux-gnu ./.work/f2d.test -test.v
              ;;
          esac
