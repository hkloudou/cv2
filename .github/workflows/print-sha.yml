# One-shot bootstrap helper: prints the sha256 of the official OpenCV 5.0.0
# source tarball so it can be pinned in build/build.conf. Delete after use.
name: print-sha

on:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/print-sha.yml'

permissions: {}

jobs:
  sha:
    runs-on: ubuntu-24.04
    steps:
      - name: Hash the official tarball
        run: |
          set -euo pipefail
          curl -fL --retry 3 -o opencv-5.0.0.tar.gz \
            https://github.com/opencv/opencv/archive/refs/tags/5.0.0.tar.gz
          sha256sum opencv-5.0.0.tar.gz
