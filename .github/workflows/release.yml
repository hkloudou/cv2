# Cuts a release: tags every libs module at the head of its prebuilt branch,
# pins those versions in the root go.mod, and tags the root module.
#
# Two ways to trigger it, after build-libs and test are green:
#   - manually from the Actions tab (version input), or
#   - by committing the new version (e.g. "0.1.0") to the RELEASE_VERSION
#     file on the default branch. Re-pushing an already-released version is
#     a no-op, so the trigger is idempotent.
name: release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Semantic version WITHOUT the leading v (e.g. 0.1.0)'
        required: true
        type: string
  push:
    branches:
      - main
    paths:
      - RELEASE_VERSION

permissions:
  contents: write

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: false
      - name: Release
        env:
          # Passed via env, not string interpolation, so a crafted input
          # cannot inject shell syntax into the run block.
          VERSION: ${{ inputs.version }}
        run: |
          set -euo pipefail
          if [ -z "${VERSION:-}" ]; then
            VERSION=$(tr -d '[:space:]' < RELEASE_VERSION)
          fi
          if git ls-remote --exit-code origin "refs/tags/v$VERSION" >/dev/null 2>&1; then
            echo "tag v$VERSION already exists; nothing to release"
            exit 0
          fi
          build/release.sh "$VERSION"
