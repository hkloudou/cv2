# One-shot maintenance: removes the pre-versioning bootstrap tags
# (v0.1.0 / v0.2.0 era). Delete this file after it has run.
name: cleanup-tags

on:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/cleanup-tags.yml'

permissions:
  contents: write

jobs:
  cleanup:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Delete bootstrap-era tags
        run: |
          set -euo pipefail
          for tag in \
            v0.1.0 v0.2.0 \
            libs/darwin_arm64/v0.1.0 libs/darwin_arm64/v0.2.0 \
            libs/linux_386/v0.1.0 libs/linux_386/v0.2.0 \
            libs/linux_amd64/v0.1.0 libs/linux_amd64/v0.2.0 \
            libs/linux_arm64/v0.1.0 libs/linux_arm64/v0.2.0 \
            libs/windows_386/v0.1.0 libs/windows_386/v0.2.0 \
            libs/windows_amd64/v0.1.0 libs/windows_amd64/v0.2.0; do
            if git ls-remote --exit-code origin "refs/tags/$tag" >/dev/null 2>&1; then
              git push origin ":refs/tags/$tag"
              echo "deleted $tag"
            else
              echo "already absent: $tag"
            fi
          done
