# Builds the static libraries for every supported platform and every OpenCV
# version line, on plain Linux runners (Windows targets are cross-compiled
# with MinGW-w64) plus a macos-14 runner for darwin/arm64. Each (version,
# target) result is force-pushed as a single orphan commit to its
# prebuilt/<opencv-version>/<target> branch.
#
# Two-layer caching keeps this cheap:
#   - "fixed layer" (OpenCV + zlib): rebuilt only when the OPENCV_BUILD_KEY
#     changes (build/build.conf, target env, toolchain file, version line);
#     otherwise the SDK stored in the prebuilt branch is reused.
#   - "moving layer" (wrapper archives): always rebuilt, takes seconds.
name: build-libs

# Only the default branch may publish prebuilt/* branches: they are shared,
# force-pushed artifacts. Update this list if the default branch is renamed.
on:
  push:
    branches:
      - main
    paths:
      - 'build/**'
      - 'wrapper/**'
      - '.github/workflows/build-libs.yml'
  workflow_dispatch:
    inputs:
      force_opencv_rebuild:
        description: Rebuild OpenCV even if the build key is unchanged
        type: boolean
        default: false

permissions:
  contents: write

# A single global group: two overlapping publishes of the same prebuilt
# branches must never interleave, regardless of which ref triggered them.
concurrency:
  group: build-libs
  cancel-in-progress: true

jobs:
  # Reads the OpenCV version lines from build.conf so the matrix has a
  # single source of truth.
  setup:
    runs-on: ubuntu-24.04
    outputs:
      versions: ${{ steps.v.outputs.versions }}
    steps:
      - uses: actions/checkout@v4
      - id: v
        run: |
          set -euo pipefail
          source build/build.conf
          versions=$(python3 -c 'import json,sys; print(json.dumps(sys.argv[1:]))' $OPENCV_VERSIONS)
          echo "versions=$versions" >> "$GITHUB_OUTPUT"
          echo "OpenCV version lines: $versions"

  build:
    needs: setup
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        opencv: ${{ fromJson(needs.setup.outputs.versions) }}
        target:
          - linux-amd64
          - linux-386
          - linux-arm64
          - windows-amd64
          - windows-386
          - darwin-arm64
        include:
          - target: linux-amd64
            runner: ubuntu-24.04
          - target: linux-386
            runner: ubuntu-24.04
          - target: linux-arm64
            runner: ubuntu-24.04
          - target: windows-amd64
            runner: ubuntu-24.04
          - target: windows-386
            runner: ubuntu-24.04
          - target: darwin-arm64
            runner: macos-14
    env:
      CV2_OPENCV_VERSION: ${{ matrix.opencv }}
      TARGET: ${{ matrix.target }}
    steps:
      - uses: actions/checkout@v4

      - name: Install toolchain
        run: |
          if [ "$RUNNER_OS" = "macOS" ]; then
            brew install ninja
          else
            sudo apt-get update
            # shellcheck disable=SC2046
            sudo apt-get install -y --no-install-recommends cmake ninja-build \
              $(build/ci-apt-packages.sh "$TARGET")
          fi

      - name: Decide whether OpenCV needs rebuilding
        id: plan
        env:
          FORCE: ${{ inputs.force_opencv_rebuild }}
        run: |
          set -euo pipefail
          branch="prebuilt/$CV2_OPENCV_VERSION/$TARGET"
          new_key=$(build/build-key.sh "$TARGET" opencv)
          reuse=false
          if [ "${FORCE:-false}" != "true" ] \
            && git ls-remote --exit-code origin "refs/heads/$branch" >/dev/null 2>&1; then
            git fetch --depth 1 origin "refs/heads/$branch"
            old_key=$(git show FETCH_HEAD:MANIFEST 2>/dev/null | sed -n 's/^OPENCV_BUILD_KEY=//p' || true)
            if [ "$old_key" = "$new_key" ]; then
              reuse=true
            fi
          fi
          echo "reuse=$reuse" >> "$GITHUB_OUTPUT"
          echo "OpenCV build key for $branch: $new_key (reuse=$reuse)"

      - name: Restore OpenCV SDK from prebuilt branch
        if: steps.plan.outputs.reuse == 'true'
        run: |
          set -euo pipefail
          mkdir -p ".work/dist/$CV2_OPENCV_VERSION/$TARGET"
          git archive FETCH_HEAD sdk | tar -x -C ".work/dist/$CV2_OPENCV_VERSION/$TARGET"
          mv ".work/dist/$CV2_OPENCV_VERSION/$TARGET/sdk" ".work/dist/$CV2_OPENCV_VERSION/$TARGET/opencv"

      - name: Build OpenCV (static, minimal module list)
        if: steps.plan.outputs.reuse != 'true'
        run: build/build-opencv.sh "$TARGET"

      - name: Build wrappers
        run: build/build-wrapper.sh "$TARGET"

      - name: Package libs modules
        run: build/package-libs.sh "$TARGET"

      - name: Push prebuilt branch
        run: build/push-prebuilt.sh "$TARGET"

  # Retire prebuilt branches for version lines no longer in OPENCV_VERSIONS
  # (released tags keep their snapshots reachable forever) and any
  # pre-versioning flat branch names.
  prune-retired:
    needs: build
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Delete retired prebuilt branches
        run: |
          set -euo pipefail
          source build/build.conf
          git ls-remote origin 'refs/heads/prebuilt/*' | awk '{print $2}' | while read -r ref; do
            rest=${ref#refs/heads/prebuilt/}
            version=${rest%%/*}
            keep=false
            if [ "$version" != "$rest" ]; then
              for v in $OPENCV_VERSIONS; do
                [ "$version" = "$v" ] && keep=true
              done
            fi
            if [ "$keep" = false ]; then
              git push origin ":$ref"
              echo "deleted retired branch ${ref#refs/heads/}"
            fi
          done
